services:
  redis:
    image: redis:7-alpine
    ports:
      - "${PROTOTYPE_REDIS_PORT:-6379}:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    ports:
      - "${PROTOTYPE_BACKEND_PORT:-8000}:8000"

  frontend:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    ports:
      - "${PROTOTYPE_FRONTEND_PORT:-4173}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
